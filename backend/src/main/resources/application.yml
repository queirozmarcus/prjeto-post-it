spring:
  application:
    name: postit-api
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postit_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # SEC-012: desabilitado para evitar vazamento de queries SQL em produção
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/postit_db}
    user: ${SPRING_FLYWAY_USER:user}
    password: ${SPRING_FLYWAY_PASSWORD:password}

app:
  security:
    jwt-secret: ${JWT_SECRET:dev-only-secret-not-for-production-use-replace-me}
    jwt-expiration-ms: 3600000  # 1 hora
    cookie-secure: ${COOKIE_SECURE:false}  # SEC-006: false em dev, true em produção HTTPS

management:
  endpoints:
    web:
      exposure:
        include: health  # SEC-005: removido 'info' — expõe apenas health
  endpoint:
    health:
      show-details: when_authorized  # SEC-005: detalhes somente para usuários autenticados
